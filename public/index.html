<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuralProxy — AI Chat Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: rgba(120, 120, 200, 0.12);
      --accent: #7c6af7;
      --accent2: #4fc4cf;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --text: #e8e8f0;
      --muted: #666680;
      --user-bubble: #1e1a3a;
      --ai-bubble: #141420;
      --danger: #f05a7e;
      --success: #4fc4cf;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient orb */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: orbPulse 8s ease-in-out infinite alternate;
    }

    @keyframes orbPulse {
      from { transform: scale(1) translate(0, 0); opacity: 0.6; }
      to   { transform: scale(1.15) translate(-30px, 40px); opacity: 1; }
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    #status-badge.ready { color: var(--success); border-color: rgba(79,196,207,0.3); }
    #status-badge.error { color: var(--danger); border-color: rgba(240,90,126,0.3); }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    #status-badge.ready .status-dot { background: var(--success); animation: blink 2s ease-in-out infinite; }
    #status-badge.error .status-dot { background: var(--danger); }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .settings-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 13px;
      transition: all 0.2s;
    }
    .settings-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ─── PROVIDER BAR ─── */
    #provider-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .provider-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-right: 4px;
    }

    .provider-chip {
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .provider-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .provider-chip:hover:not(.active) {
      border-color: var(--accent);
      color: var(--text);
    }

    .model-input {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }
    .model-input:focus { border-color: var(--accent); }
    .model-input::placeholder { color: var(--muted); }

    /* ─── CHAT AREA ─── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.5;
      text-align: center;
      padding: 40px;
    }

    .empty-icon {
      font-size: 48px;
      filter: grayscale(0.5);
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.8;
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeSlide 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
    }

    .msg.assistant .avatar {
      background: linear-gradient(135deg, var(--accent2), #2dd4bf);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.7;
      font-size: 13.5px;
      word-break: break-word;
      border: 1px solid var(--border);
      position: relative;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border-radius: 12px 2px 12px 12px;
    }

    .msg.assistant .bubble {
      background: var(--ai-bubble);
      border-radius: 2px 12px 12px 12px;
    }

    .bubble code {
      background: rgba(124,106,247,0.15);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent2);
    }

    .bubble pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none;
      padding: 0;
      color: var(--text);
    }

    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      text-align: right;
    }

    .msg.user .msg-meta { text-align: right; }
    .msg.assistant .msg-meta { text-align: left; }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Error message */
    .error-msg {
      background: rgba(240,90,126,0.08);
      border: 1px solid rgba(240,90,126,0.25);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    /* ─── INPUT AREA ─── */
    #input-area {
      padding: 12px 0 20px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .system-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .system-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #system-prompt {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      outline: none;
      transition: all 0.2s;
    }

    #system-prompt:focus { border-color: var(--accent); color: var(--text); }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13.5px;
      padding: 12px 16px;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow-y: auto;
    }

    #msg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #msg-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(124,106,247,0.4);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .clear-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 48px;
      height: 48px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .clear-btn:hover { color: var(--danger); border-color: rgba(240,90,126,0.4); }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      padding: 0 2px;
    }

    .shortcut-hint {
      font-size: 10px;
      color: var(--muted);
    }

    .token-counter {
      font-size: 10px;
      color: var(--muted);
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: min(480px, 90vw);
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 20px;
      color: var(--text);
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
    }

    .field select option { background: var(--surface2); }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-mono);
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

    .btn-save {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-mono);
      transition: all 0.2s;
    }
    .btn-save:hover { background: #9580ff; }

    /* Responsive */
    @media (max-width: 600px) {
      .bubble { max-width: 88%; }
      .model-input { width: 130px; }
      .logo-text { font-size: 15px; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">NeuralProxy</span>
    </div>
    <div class="header-right">
      <div id="status-badge">
        <div class="status-dot"></div>
        <span id="status-text">checking…</span>
      </div>
      <button class="settings-btn" onclick="openSettings()">⚙ config</button>
    </div>
  </header>

  <!-- PROVIDER BAR -->
  <div id="provider-bar">
    <span class="provider-label">via</span>
    <button class="provider-chip active" data-p="anthropic" onclick="switchProvider(this)">anthropic</button>
    <button class="provider-chip" data-p="openai" onclick="switchProvider(this)">openai</button>
    <button class="provider-chip" data-p="groq" onclick="switchProvider(this)">groq</button>
    <input id="model-override" class="model-input" placeholder="model override (optional)" />
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">Ready to proxy</div>
      <div class="empty-sub">
        Messages route through your Vercel serverless function.<br/>
        Your API key never touches the browser.
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <div class="system-row">
      <span class="system-label">system</span>
      <input id="system-prompt" value="You are a helpful assistant." />
    </div>
    <div class="input-row">
      <textarea id="msg-input" placeholder="Send a message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button class="clear-btn" title="Clear chat" onclick="clearChat()">⟳</button>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
    <div class="input-footer">
      <span class="shortcut-hint">↵ send · ⇧↵ newline</span>
      <span class="token-counter" id="char-count">0 chars</span>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>⚙ Configuration</h2>
    <div class="field">
      <label>Proxy Base URL</label>
      <input id="cfg-url" placeholder="https://your-app.vercel.app" />
    </div>
    <div class="field">
      <label>Max Tokens</label>
      <input id="cfg-tokens" type="number" value="1024" min="128" max="8192" />
    </div>
    <div class="field">
      <label>Temperature (note: send in request body if needed)</label>
      <input id="cfg-temp" type="number" value="0.7" min="0" max="2" step="0.1" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">cancel</button>
      <button class="btn-save" onclick="saveSettings()">save</button>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────
  let history = [];
  let isLoading = false;
  let provider = 'anthropic';

  // Config: default to relative URL (works when deployed on Vercel)
  // Override via Settings modal for external use
  let config = {
    baseUrl: '',        // empty = same origin (Vercel deployment)
    maxTokens: 1024,
  };

  // Load saved config
  try {
    const saved = JSON.parse(sessionStorage.getItem('np_config') || '{}');
    Object.assign(config, saved);
    if (saved.baseUrl) document.getElementById('cfg-url').value = saved.baseUrl;
    if (saved.maxTokens) document.getElementById('cfg-tokens').value = saved.maxTokens;
    if (saved.provider) {
      provider = saved.provider;
      document.querySelectorAll('.provider-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.p === provider);
      });
    }
  } catch(e) {}

  // ── Status check ───────────────────────────────────────────────────
  async function checkStatus() {
    const badge = document.getElementById('status-badge');
    const text  = document.getElementById('status-text');
    try {
      const base = config.baseUrl || '';
      const r = await fetch(`${base}/api/status`);
      const d = await r.json();
      if (d.key_configured) {
        badge.className = 'ready';
        text.textContent = `${d.provider} · ready`;
      } else {
        badge.className = 'error';
        text.textContent = `${d.provider} · no key`;
      }
    } catch(e) {
      badge.className = 'error';
      text.textContent = 'unreachable';
    }
  }

  checkStatus();

  // ── Provider switching ─────────────────────────────────────────────
  function switchProvider(btn) {
    document.querySelectorAll('.provider-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    provider = btn.dataset.p;
    saveToSession();
    checkStatus();
  }

  // ── Settings ───────────────────────────────────────────────────────
  function openSettings() {
    document.getElementById('cfg-url').value = config.baseUrl || '';
    document.getElementById('cfg-tokens').value = config.maxTokens || 1024;
    document.getElementById('modal').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('modal').classList.remove('open');
  }

  function saveSettings() {
    config.baseUrl   = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
    config.maxTokens = parseInt(document.getElementById('cfg-tokens').value) || 1024;
    saveToSession();
    closeSettings();
    checkStatus();
  }

  function saveToSession() {
    try {
      sessionStorage.setItem('np_config', JSON.stringify({ ...config, provider }));
    } catch(e) {}
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
  });

  // ── Auto-grow textarea ─────────────────────────────────────────────
  const textarea = document.getElementById('msg-input');
  const charCount = document.getElementById('char-count');

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
    charCount.textContent = textarea.value.length + ' chars';
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Chat rendering ─────────────────────────────────────────────────
  function renderMessage(role, text) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const chat = document.getElementById('chat');

    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '◈' : '⚡';

    const col = document.createElement('div');
    col.style.display = 'flex';
    col.style.flexDirection = 'column';
    col.style.gap = '2px';
    col.style.maxWidth = '75%';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

    col.appendChild(bubble);
    col.appendChild(meta);
    wrapper.appendChild(avatar);
    wrapper.appendChild(col);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;

    return bubble;
  }

  function formatText(text) {
    // Simple markdown: code blocks, inline code, bold
    return text
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br/>');
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';
    wrapper.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '⚡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = `
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    `;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  function showError(msg) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.innerHTML = `<span>⚠</span><span>${msg}</span>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Send ───────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    input.value = '';
    input.style.height = 'auto';
    charCount.textContent = '0 chars';

    history.push({ role: 'user', content: text });
    renderMessage('user', text);
    showTyping();

    const base   = config.baseUrl || '';
    const system = document.getElementById('system-prompt').value.trim();
    const model  = document.getElementById('model-override').value.trim() || undefined;

    try {
      const res = await fetch(`${base}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          system,
          model,
          max_tokens: config.maxTokens,
          _provider: provider,  // informational; actual provider is set server-side via env
        }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        showError(data.error || `HTTP ${res.status}`);
        history.pop(); // remove failed user message from history
      } else {
        const reply = data.reply || '(empty response)';
        history.push({ role: 'assistant', content: reply });
        renderMessage('assistant', reply);
      }
    } catch (err) {
      removeTyping();
      showError(`Network error: ${err.message}. Check your Proxy Base URL in ⚙ config.`);
      history.pop();
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    textarea.focus();
  }

  // ── Clear ──────────────────────────────────────────────────────────
  function clearChat() {
    history = [];
    const chat = document.getElementById('chat');
    chat.innerHTML = `
      <div id="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-title">Conversation cleared</div>
        <div class="empty-sub">Start a new thread.</div>
      </div>
    `;
  }
</script>
</body>
</html>
